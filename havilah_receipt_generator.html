<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Havilah Treats – Receipt Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:        #e8187a;
      --pink-light:  #ff5aaa;
      --pink-pale:   #ffe0f0;
      --navy:        #2b3590;
      --navy-light:  #4a5ad4;
      --navy-pale:   #e8eaff;
      --white:       #ffffff;
      --off-white:   #fafafa;
      --cream:       #fff8fc;
      --berry:       #7b2d8b;
      --red-accent:  #e63946;
      --text-dark:   #1a1a2e;
      --text-mid:    #4a4a6a;
      --text-light:  #8888aa;
      --border:      #eaeaf5;
      --shadow-pink: 0 8px 32px rgba(232,24,122,0.18);
      --shadow-navy: 0 8px 32px rgba(43,53,144,0.15);
      --shadow-card: 0 2px 20px rgba(43,53,144,0.10);
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #f0f2ff 0%, #fff0f8 50%, #f8f0ff 100%);
      min-height: 100vh;
    }

    /* === DECORATIVE DOTS BACKGROUND === */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        radial-gradient(circle, #e8187a22 2px, transparent 2px),
        radial-gradient(circle, #2b359022 2px, transparent 2px);
      background-size: 48px 48px, 72px 72px;
      background-position: 0 0, 24px 24px;
      pointer-events:none; z-index:0;
    }

    /* === HEADER === */
    header {
      position:relative; z-index:10;
      background: linear-gradient(135deg, var(--navy) 0%, #1a1f7a 100%);
      padding: 0;
      overflow:hidden;
    }
    header::before {
      content:'';
      position:absolute; inset:0;
      background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='3' fill='%23e8187a' fill-opacity='0.15'/%3E%3Ccircle cx='50' cy='20' r='5' fill='%23ffffff' fill-opacity='0.05'/%3E%3Ccircle cx='70' cy='60' r='4' fill='%23e8187a' fill-opacity='0.1'/%3E%3Ccircle cx='20' cy='65' r='3' fill='%23ffffff' fill-opacity='0.07'/%3E%3C/svg%3E");
      pointer-events:none;
    }
    .header-inner {
      display:flex; align-items:center; gap:20px;
      padding:16px 36px; position:relative;
    }
    .header-logo-wrap {
      width:72px; height:72px; border-radius:50%;
      border:3px solid var(--pink);
      box-shadow: 0 0 0 4px rgba(232,24,122,0.2), var(--shadow-pink);
      overflow:hidden; flex-shrink:0;
      background:#fff;
    }
    .header-logo-wrap img { width:100%; height:100%; object-fit:cover; }
    .header-text h1 {
      font-family:'Nunito',sans-serif;
      font-weight:900; font-size:1.75rem;
      background: linear-gradient(90deg, var(--pink-light), #fff 60%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:1px;
    }
    .header-text .tagline {
      color: #a0b0ff; font-size:0.78rem; font-weight:600;
      letter-spacing:2px; text-transform:uppercase; margin-top:2px;
    }
    .header-badge {
      margin-left:auto;
      background: rgba(232,24,122,0.2);
      border:1px solid rgba(232,24,122,0.4);
      color:var(--pink-light);
      padding:6px 16px; border-radius:20px;
      font-size:0.75rem; font-weight:700; letter-spacing:1px;
      text-transform:uppercase;
    }

    /* === LAYOUT === */
    .app-wrapper {
      position:relative; z-index:1;
      max-width:1300px; margin:0 auto;
      padding:32px 24px;
      display:grid; grid-template-columns:1fr 1fr; gap:28px;
    }
    @media(max-width:900px){ .app-wrapper{ grid-template-columns:1fr; } }

    /* === CARDS === */
    .card {
      background:var(--white);
      border-radius:20px;
      box-shadow: var(--shadow-card);
      overflow:hidden;
      border:1.5px solid var(--border);
    }
    .card-head {
      padding:18px 24px;
      display:flex; align-items:center; gap:12px;
    }
    .card-head.pink { background:linear-gradient(135deg,var(--pink),#c4106a); }
    .card-head.navy { background:linear-gradient(135deg,var(--navy),#1a1f7a); }
    .card-head h2 {
      color:#fff; font-size:1rem; font-weight:800;
      letter-spacing:0.5px;
    }
    .card-head .icon {
      width:34px; height:34px; border-radius:10px;
      background:rgba(255,255,255,0.2);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .card-body { padding:26px 24px; }

    /* === SECTION LABELS === */
    .section-label {
      font-size:0.7rem; font-weight:800; text-transform:uppercase;
      letter-spacing:1.5px; color:var(--pink);
      margin-bottom:12px; margin-top:20px;
      display:flex; align-items:center; gap:8px;
    }
    .section-label::after {
      content:''; flex:1; height:1.5px;
      background:linear-gradient(90deg,var(--pink-pale),transparent);
    }
    .section-label:first-child{ margin-top:0; }

    /* === FORM ELEMENTS === */
    .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    @media(max-width:480px){ .row-2,.row-3{ grid-template-columns:1fr; } }

    .field { margin-bottom:14px; }
    .field label {
      display:block; font-size:0.73rem; font-weight:700;
      color:var(--navy); letter-spacing:0.5px;
      text-transform:uppercase; margin-bottom:5px;
    }
    input, select, textarea {
      width:100%; padding:10px 14px;
      border:2px solid var(--border); border-radius:10px;
      background:var(--off-white); color:var(--text-dark);
      font-family:'Nunito',sans-serif; font-size:0.92rem; font-weight:600;
      transition:border 0.2s, box-shadow 0.2s, background 0.2s;
      outline:none;
    }
    input:focus, select:focus, textarea:focus {
      border-color:var(--pink);
      box-shadow:0 0 0 4px rgba(232,24,122,0.12);
      background:#fff;
    }
    textarea { resize:vertical; min-height:64px; }

    /* === ITEMS === */
    .items-header {
      display:grid; grid-template-columns:2.5fr 0.8fr 1.1fr 36px;
      gap:8px; padding:8px 12px;
      background:var(--navy-pale); border-radius:8px;
      font-size:0.68rem; font-weight:800; color:var(--navy);
      text-transform:uppercase; letter-spacing:0.8px;
      margin-bottom:6px;
    }
    .items-header span:not(:first-child) { text-align:center; }

    .item-row {
      display:grid; grid-template-columns:2.5fr 0.8fr 1.1fr 36px;
      gap:8px; align-items:center; margin-bottom:7px;
    }
    .item-row input { padding:9px 10px; font-size:0.87rem; }
    .item-row input[type="number"] { text-align:center; }

    .btn-rm {
      width:36px; height:36px; border-radius:8px; cursor:pointer;
      background:var(--pink-pale); border:2px solid #ffb3d1;
      color:var(--pink); font-size:1rem; font-weight:900;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s, transform 0.1s;
      flex-shrink:0;
    }
    .btn-rm:hover { background:#ffb3d1; transform:scale(1.05); }

    .btn-add-item {
      width:100%; padding:10px; border-radius:10px; cursor:pointer;
      background:var(--navy-pale); border:2px dashed var(--navy-light);
      color:var(--navy); font-family:'Nunito',sans-serif;
      font-size:0.88rem; font-weight:700;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:background 0.2s; margin-top:4px;
    }
    .btn-add-item:hover { background:#d8dcff; }

    /* === TOTALS WIDGET === */
    .totals-card {
      background:linear-gradient(135deg, var(--navy-pale), #f0f0ff);
      border:2px solid var(--border); border-radius:14px;
      padding:16px; margin-top:16px;
    }
    .total-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:5px 0; font-size:0.88rem; color:var(--text-mid);
    }
    .total-row input[type="number"] {
      width:90px; padding:5px 8px; font-size:0.83rem;
      border-radius:7px; text-align:right;
    }
    .total-row.grand {
      margin-top:10px; padding-top:12px;
      border-top:2px solid var(--pink);
      font-size:1.2rem; font-weight:900;
      color:var(--navy);
    }
    .total-row.grand span:last-child { color:var(--pink); }

    /* === BUTTONS === */
    .actions { display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
    .btn {
      flex:1; min-width:100px; padding:12px 18px; border-radius:12px;
      font-family:'Nunito',sans-serif; font-size:0.9rem; font-weight:800;
      cursor:pointer; border:none;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:all 0.2s; letter-spacing:0.3px;
    }
    .btn-pink {
      background:linear-gradient(135deg,var(--pink),#c4106a);
      color:#fff; box-shadow:var(--shadow-pink);
    }
    .btn-pink:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(232,24,122,0.4); }
    .btn-navy {
      background:linear-gradient(135deg,var(--navy),#1a1f7a);
      color:#fff; box-shadow:var(--shadow-navy);
    }
    .btn-navy:hover { transform:translateY(-2px); }
    .btn-ghost {
      background:#fff; border:2px solid var(--border); color:var(--text-mid);
    }
    .btn-ghost:hover { background:var(--off-white); border-color:#ccc; }

    /* === RECEIPT PREVIEW === */
    .preview-wrap {
      background:var(--white); border-radius:20px;
      box-shadow:var(--shadow-card); overflow:hidden;
      border:1.5px solid var(--border);
    }

    .empty-state {
      padding:70px 20px; text-align:center; color:var(--text-light);
    }
    .empty-state .empty-icon {
      width:80px; height:80px; border-radius:50%;
      background:linear-gradient(135deg,var(--pink-pale),var(--navy-pale));
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 16px; font-size:2rem;
    }
    .empty-state p { font-size:0.88rem; line-height:1.7; }
    .empty-state strong { color:var(--navy); }

    /* === RECEIPT PAPER === */
    .receipt-zigzag-top {
      height:18px;
      background: repeating-linear-gradient(-45deg,
        #fff 0,#fff 9px, #f0f2ff 9px, #f0f2ff 18px);
    }
    .receipt-zigzag-bottom {
      height:18px;
      background: repeating-linear-gradient(45deg,
        #fff 0,#fff 9px, #f0f2ff 9px, #f0f2ff 18px);
    }

    .receipt-body { padding:28px 28px 20px; }

    .r-head {
      text-align:center;
      padding-bottom:18px;
      border-bottom:2px dashed #e0e0f0;
      margin-bottom:16px;
    }
    .r-logo {
      width:88px; height:88px; border-radius:50%;
      object-fit:cover; display:block; margin:0 auto 10px;
      border:3px solid var(--pink);
      box-shadow: 0 0 0 5px var(--pink-pale), var(--shadow-pink);
    }
    .r-biz-name {
      font-weight:900; font-size:1.5rem;
      letter-spacing:1.5px; text-transform:uppercase;
    }
    .r-biz-name .pink-part { color:var(--pink); }
    .r-biz-name .navy-part { color:var(--navy); }
    .r-tagline {
      font-size:0.7rem; color:var(--navy-light);
      letter-spacing:2.5px; text-transform:uppercase;
      margin-top:2px; font-weight:700;
    }
    .r-contact {
      margin-top:10px; font-size:0.76rem; color:var(--text-mid);
      line-height:1.9; font-weight:600;
    }

    .r-meta {
      display:grid; grid-template-columns:1fr 1fr;
      gap:10px; padding:14px 0;
      border-bottom:1px dashed #e0e0f0; margin-bottom:14px;
    }
    .r-meta-item { display:flex; flex-direction:column; gap:2px; }
    .r-meta-item:nth-child(even) { text-align:right; }
    .r-meta-label {
      font-size:0.65rem; font-weight:800; text-transform:uppercase;
      letter-spacing:1px; color:var(--pink);
    }
    .r-meta-value { font-size:0.86rem; font-weight:700; color:var(--text-dark); }

    .r-customer {
      background:linear-gradient(135deg,var(--navy-pale),#eef0ff);
      border-radius:10px; padding:12px 14px;
      margin-bottom:16px;
    }
    .r-customer-label {
      font-size:0.65rem; font-weight:800; color:var(--navy-light);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;
    }
    .r-customer-name { font-size:1rem; font-weight:900; color:var(--navy); }
    .r-customer-contact { font-size:0.76rem; color:var(--text-mid); margin-top:2px; font-weight:600; }

    .r-table-head {
      display:grid; grid-template-columns:2.5fr 0.7fr 1.1fr 1.1fr;
      padding:8px 10px;
      background:linear-gradient(135deg,var(--pink),#c4106a);
      border-radius:8px; margin-bottom:6px;
      font-size:0.67rem; font-weight:800;
      color:#fff; text-transform:uppercase; letter-spacing:0.8px;
    }
    .r-table-head span:not(:first-child) { text-align:right; }

    .r-item {
      display:grid; grid-template-columns:2.5fr 0.7fr 1.1fr 1.1fr;
      padding:9px 10px; align-items:center;
      font-size:0.83rem; border-bottom:1px solid #f0f0f8;
    }
    .r-item:last-child { border-bottom:none; }
    .r-item span:not(:first-child) { text-align:right; }
    .r-item-name { font-weight:700; color:var(--text-dark); }
    .r-item-qty,.r-item-price { color:var(--text-mid); font-weight:600; }
    .r-item-total { font-weight:800; color:var(--navy); }

    .r-items-wrap {
      border:1.5px solid #e8e8f5; border-radius:10px;
      overflow:hidden; margin-bottom:16px;
    }

    .r-totals {
      border:1.5px solid #e8e8f5; border-radius:10px;
      padding:14px; margin-bottom:14px;
    }
    .r-total-row {
      display:flex; justify-content:space-between;
      font-size:0.84rem; color:var(--text-mid); padding:4px 0;
      font-weight:600;
    }
    .r-total-row.grand {
      border-top:2px solid var(--pink); margin-top:8px; padding-top:10px;
      font-size:1.15rem; font-weight:900; color:var(--navy);
    }
    .r-total-row.grand span:last-child { color:var(--pink); }

    .r-payment {
      display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;
    }
    .r-pay-chip {
      padding:7px 14px; border-radius:20px;
      font-size:0.78rem; font-weight:800;
      display:flex; align-items:center; gap:6px;
    }
    .r-pay-chip.method {
      background:var(--navy-pale); color:var(--navy);
    }
    .r-pay-chip.paid {
      background:#d4f7e7; color:#1a7a4f;
    }
    .r-pay-chip.pending {
      background:#fff3cd; color:#a07800;
    }
    .r-pay-chip.partial {
      background:#e8f0ff; color:#1a3faa;
    }

    .r-notes {
      background:var(--pink-pale); border-radius:10px;
      padding:12px 14px; margin-bottom:14px;
      font-size:0.82rem; color:var(--text-mid);
      font-style:italic; font-weight:600;
      border-left:4px solid var(--pink);
    }

    .r-footer {
      text-align:center; padding-top:14px;
      border-top:2px dashed #e0e0f0;
    }
    .r-footer .thanks {
      font-weight:900; font-size:1rem; color:var(--pink);
    }
    .r-footer .sub {
      font-size:0.72rem; color:var(--text-light);
      margin-top:4px; font-weight:600; letter-spacing:0.5px;
    }
    .r-footer .dots {
      display:flex; justify-content:center; gap:6px; margin-top:12px;
    }
    .r-footer .dot {
      width:8px; height:8px; border-radius:50%;
    }

    /* === TOAST === */
    #toast {
      position:fixed; bottom:28px; right:28px; z-index:9999;
      background:linear-gradient(135deg,var(--navy),#1a1f7a);
      color:#fff; padding:13px 22px; border-radius:14px;
      font-size:0.88rem; font-weight:700;
      border:2px solid var(--pink);
      box-shadow:var(--shadow-pink);
      opacity:0; transform:translateY(10px) scale(0.97);
      transition:all 0.3s; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateY(0) scale(1); }

    @media print {
      body{ background:#fff!important; }
      body::before{ display:none; }
      header,.card:first-child,.actions,.card-head.navy{ display:none!important; }
      .app-wrapper{ grid-template-columns:1fr; max-width:480px; margin:0 auto; padding:0; }
      .preview-wrap{ box-shadow:none; border:none; }
    }
  </style>
</head>

<div class="app-wrapper">

  <!-- ====== FORM PANEL ====== -->
  <div class="card">
    <div class="card-head pink">
      <div class="icon">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </div>
      <h2>New Receipt</h2>
    </div>
    <div class="card-body">

      <div class="section-label">📋 Receipt Info</div>
      <div class="row-2">
        <div class="field">
          <label>Receipt No.</label>
          <input type="text" id="receipt-no" value="HT-0001"/>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="receipt-date"/>
        </div>
      </div>

      <div class="section-label">👤 Customer Details</div>
      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="customer-name" placeholder="Full name"/>
      </div>
      <div class="row-2">
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="customer-phone" placeholder="+234..."/>
        </div>
        <div class="field">
          <label>Email (optional)</label>
          <input type="email" id="customer-email" placeholder="email@..."/>
        </div>
      </div>

      <div class="section-label">🍓 Order Items</div>
      <div class="items-header">
        <span>Description</span>
        <span>Qty</span>
        <span>Price (₦)</span>
        <span></span>
      </div>
      <div id="items-container"></div>
      <button class="btn-add-item" onclick="addItem()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
        Add Item
      </button>

      <div class="totals-card">
        <div class="total-row">
          <span>Subtotal</span>
          <span id="sub-display">₦0.00</span>
        </div>
        <div class="total-row">
          <span>Discount (%)</span>
          <input type="number" id="discount" value="0" min="0" max="100" oninput="updateTotals()"/>
        </div>
        <div class="total-row">
          <span>Delivery Fee (₦)</span>
          <input type="number" id="delivery" value="0" min="0" oninput="updateTotals()" placeholder="0"/>
        </div>
        <div class="total-row grand">
          <span>TOTAL</span>
          <span id="grand-display">₦0.00</span>
        </div>
      </div>

      <div class="section-label">💳 Payment</div>
      <div class="row-2">
        <div class="field">
          <label>Method</label>
          <select id="pay-method">
            <option>Cash</option>
            <option>Bank Transfer</option>
            <option>POS</option>
            <option>On Credit</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="pay-status">
            <option>Paid</option>
            <option>Pending</option>
            <option>Partial</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Notes / Message</label>
        <textarea id="notes" placeholder="e.g. Thank you for your order! 🍓"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-pink" onclick="generateReceipt()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Generate
        </button>
        <button class="btn btn-navy" onclick="printReceipt()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a1 1 0 001-1v-4a1 1 0 00-1-1H9a1 1 0 00-1 1v4a1 1 0 001 1zm1-12V4a1 1 0 00-1-1H9a1 1 0 00-1 1v1"/></svg>
          Print
        </button>
        <button class="btn btn-ghost" onclick="clearForm()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          Clear
        </button>
      </div>

    </div>
  </div>

  <!-- ====== PREVIEW PANEL ====== -->
  <div>
    <div class="card-head navy" style="border-radius:20px 20px 0 0;">
      <div class="icon">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      </div>
      <h2>Live Preview</h2>
    </div>
    <div class="preview-wrap" id="receipt-preview">
      <div class="empty-state">
        <div class="empty-icon">🧾</div>
        <p>Fill the form and click<br/><strong>"Generate"</strong> to see your receipt here.</p>
      </div>
    </div>
  </div>

</div>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAH//2Q==";
  let itemCount = 0;

  // Init date
  document.getElementById('receipt-date').value = new Date().toISOString().split('T')[0];

  // Receipt counter
  function nextNo() {
    const n = parseInt(localStorage.getItem('ht_ctr') || '0') + 1;
    localStorage.setItem('ht_ctr', n);
    return 'HT-' + String(n).padStart(4,'0');
  }
  document.getElementById('receipt-no').value = nextNo();

  function addItem(n='', q=1, p='') {
    const id = ++itemCount;
    const c = document.getElementById('items-container');
    const d = document.createElement('div');
    d.className = 'item-row'; d.id = 'ir-'+id;
    d.innerHTML = `
      <input type="text" class="iname" placeholder="Item name" value="${n}" oninput="updateTotals()"/>
      <input type="number" class="iqty" value="${q}" min="1" oninput="updateTotals()"/>
      <input type="number" class="iprice" placeholder="0.00" value="${p}" min="0" step="0.01" oninput="updateTotals()"/>
      <button class="btn-rm" onclick="removeItem(${id})">✕</button>`;
    c.appendChild(d);
    updateTotals();
  }

  function removeItem(id) {
    const el = document.getElementById('ir-'+id);
    if(el){ el.remove(); updateTotals(); }
  }

  function getItems() {
    return [...document.querySelectorAll('#items-container .item-row')].map(r => {
      const n = r.querySelector('.iname').value.trim();
      const q = parseFloat(r.querySelector('.iqty').value)||0;
      const p = parseFloat(r.querySelector('.iprice').value)||0;
      return n ? {n,q,p,t:q*p} : null;
    }).filter(Boolean);
  }

  function fmt(v){
    return '₦'+v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  }

  function updateTotals() {
    const items = getItems();
    const sub = items.reduce((s,i)=>s+i.t,0);
    const disc = parseFloat(document.getElementById('discount').value)||0;
    const del = parseFloat(document.getElementById('delivery').value)||0;
    const grand = sub - (sub*disc/100) + del;
    document.getElementById('sub-display').textContent = fmt(sub);
    document.getElementById('grand-display').textContent = fmt(grand);
  }

  function generateReceipt() {
    const rno = document.getElementById('receipt-no').value||'HT-0001';
    const dv = document.getElementById('receipt-date').value;
    const dateStr = dv ? new Date(dv).toLocaleDateString('en-NG',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : '—';
    const cname = document.getElementById('customer-name').value.trim()||'—';
    const cphone = document.getElementById('customer-phone').value.trim();
    const cemail = document.getElementById('customer-email').value.trim();
    const pm = document.getElementById('pay-method').value;
    const ps = document.getElementById('pay-status').value;
    const notes = document.getElementById('notes').value.trim();
    const items = getItems();
    const disc = parseFloat(document.getElementById('discount').value)||0;
    const del = parseFloat(document.getElementById('delivery').value)||0;
    const sub = items.reduce((s,i)=>s+i.t,0);
    const discAmt = sub*disc/100;
    const grand = sub - discAmt + del;

    const statusClass = ps==='Paid'?'paid':ps==='Pending'?'pending':'partial';
    const statusIcon = ps==='Paid'?'✅':ps==='Pending'?'⏳':'🔄';

    const itemRows = items.length===0
      ? `<div class="r-item" style="color:#bbb;font-style:italic;"><span>No items added</span><span></span><span></span><span></span></div>`
      : items.map(i=>`<div class="r-item">
          <span class="r-item-name">${i.n}</span>
          <span class="r-item-qty">${i.q}</span>
          <span class="r-item-price">${fmt(i.p)}</span>
          <span class="r-item-total">${fmt(i.t)}</span>
        </div>`).join('');

    const discRow = disc>0?`<div class="r-total-row"><span>Discount (${disc}%)</span><span>-${fmt(discAmt)}</span></div>`:'';
    const delRow = del>0?`<div class="r-total-row"><span>Delivery Fee</span><span>${fmt(del)}</span></div>`:'';
    const notesHTML = notes?`<div class="r-notes">💬 ${notes}</div>`:'';
    const contactStr = [cphone,cemail].filter(Boolean).join(' · ');

    document.getElementById('receipt-preview').innerHTML = `
      <div class="receipt-zigzag-top"></div>
      <div class="receipt-body">

        <div class="r-head">
          <img src="${LOGO}" class="r-logo" alt="Havilah Treats Logo"/>
          <div class="r-biz-name">
            <span class="pink-part">HAVILAH </span><span class="navy-part">TREATS</span>
          </div>
          <div class="r-tagline">Healthy Treats · Healthy Living</div>
          <div class="r-contact">
            📍 36 Blanks On St. Mararaba, Nasarawa State<br/>
            📞 +2348064847584 / +2349127477429<br/>
            ✉️ havilahfortbakes@gmail.com
          </div>
        </div>

        <div class="r-meta">
          <div class="r-meta-item">
            <span class="r-meta-label">Receipt No.</span>
            <span class="r-meta-value">${rno}</span>
          </div>
          <div class="r-meta-item">
            <span class="r-meta-label">Date</span>
            <span class="r-meta-value">${dateStr}</span>
          </div>
        </div>

        <div class="r-customer">
          <div class="r-customer-label">Billed To</div>
          <div class="r-customer-name">${cname}</div>
          ${contactStr?`<div class="r-customer-contact">${contactStr}</div>`:''}
        </div>

        <div class="r-table-head">
          <span>Description</span>
          <span style="text-align:right">Qty</span>
          <span style="text-align:right">Unit Price</span>
          <span style="text-align:right">Total</span>
        </div>
        <div class="r-items-wrap">${itemRows}</div>

        <div class="r-totals">
          <div class="r-total-row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
          ${discRow}
          ${delRow}
          <div class="r-total-row grand"><span>TOTAL</span><span>${fmt(grand)}</span></div>
        </div>

        <div class="r-payment">
          <div class="r-pay-chip method">💳 ${pm}</div>
          <div class="r-pay-chip ${statusClass}">${statusIcon} ${ps}</div>
        </div>

        ${notesHTML}

        <div class="r-footer">
          <div class="thanks">🎉 Thank you for choosing Havilah Treats!</div>
          <div class="sub">We appreciate your patronage. Come back soon! 💕</div>
          <div class="dots">
            <div class="dot" style="background:var(--pink)"></div>
            <div class="dot" style="background:var(--navy)"></div>
            <div class="dot" style="background:var(--pink)"></div>
            <div class="dot" style="background:var(--navy)"></div>
            <div class="dot" style="background:var(--pink)"></div>
          </div>
        </div>
      </div>
      <div class="receipt-zigzag-bottom"></div>`;

    showToast('✅ Receipt generated!');
  }

  function printReceipt() {
    if(!document.querySelector('.receipt-body')){ showToast('⚠️ Generate a receipt first!'); return; }
    window.print();
  }

  function clearForm() {
    ['customer-name','customer-phone','customer-email','notes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('discount').value=0;
    document.getElementById('delivery').value=0;
    document.getElementById('pay-method').selectedIndex=0;
    document.getElementById('pay-status').selectedIndex=0;
    document.getElementById('receipt-date').value=new Date().toISOString().split('T')[0];
    document.getElementById('receipt-no').value=nextNo();
    document.getElementById('items-container').innerHTML='';
    itemCount=0;
    document.getElementById('receipt-preview').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🧾</div>
        <p>Fill the form and click<br/><strong>"Generate"</strong> to see your receipt here.</p>
      </div>`;
    updateTotals();
    showToast('🗑️ Form cleared!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  // Init 3 rows
  addItem(); addItem(); addItem();
</script>
</body>
</html>
